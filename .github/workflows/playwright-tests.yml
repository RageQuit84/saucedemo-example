name: Playwright tests

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug: list repository files
        run: |
          pwd
          echo "--- root files ---"
          ls -la
          echo "--- tests dir ---"
          ls -la tests || true
          node -v
          npm -v

      - name: Debug: list Playwright-detected tests
        run: npx playwright test --list > playwright-tests-list.txt || true

      - name: Upload test listing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-listing
          path: playwright-tests-list.txt

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
